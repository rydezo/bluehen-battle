<div class="action-bar">
    <div class="action-group">
        <button class="btn btn-default" id="move"><i class="ti ti-arrows-move" aria-hidden="true"></i> Move</button>
        <button class="btn btn-default" id="attack"><i class="ti ti-sword" aria-hidden="true"></i> Attack</button>
        <button class="btn btn-default" id="recruit"><i class="ti ti-user-plus" aria-hidden="true"></i> Recruit</button>
        <button class="btn btn-default" id="spawn"><i class="ti ti-copy-plus" aria-hidden="true"></i> Spawn</button>
        <button class="btn btn-default" id="swap"><i class="ti ti-switch-2" aria-hidden="true"></i> Swap</button>
        <button class="btn btn-default" id="renew"><i class="ti ti-refresh" aria-hidden="true"></i> Renew</button>
        <button class="btn btn-default" id="revive"><i class="ti ti-heart-plus" aria-hidden="true"></i> Revive</button>
        <button class="btn btn-heal" id="heal"><i class="ti ti-first-aid-kit" aria-hidden="true"></i> Heal</button>
        <button class="btn btn-shield" id="shield"><i class="ti ti-shield" aria-hidden="true"></i> Shield</button>
    </div>
    <button class="btn btn-cancel" id="cancel"><i class="ti ti-x" aria-hidden="true"></i> Cancel</button>
</div>
